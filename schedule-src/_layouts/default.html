<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
<meta name="description" content="{{ page.description | default: site.description }}">
<link rel="stylesheet" href="{{ '/assets/schedule.css' | relative_url }}">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='33' y='0' fill='%23009b3a'/%3E%3Crect width='100' height='34' y='33' fill='%23fed100'/%3E%3Crect width='100' height='33' y='67' fill='%23ce1126'/%3E%3C/svg%3E">
</head>
<body>
  <div class="stripes top"></div>
  <header class="site-header">
    <a class="home-link" href="{{ '/' | relative_url }}">🇯🇲 {{ site.title }}</a>
    <a class="back-link" href="https://reggae.day/">reggae.day トップへ</a>
  </header>
  <main>
    {{ content }}
  </main>
  <footer class="site-footer">
    <p>掲載情報は執筆時点の公開情報に基づきます。開催有無・詳細は必ず各イベント公式情報でご確認ください。</p>
  </footer>
  <div class="stripes bottom"></div>
</body>
</html>
